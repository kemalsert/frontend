<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetva Detay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen">

    <header class="container mx-auto px-6 py-4 flex justify-between items-center border-b border-gray-800">
        <a href="index.html" class="flex items-center gap-3">
            <i class="fa-solid fa-book-quran text-gold text-2xl"></i>
            <h1 class="font-serif font-bold text-xl tracking-wider">FETVA KÜTÜPHANESİ</h1>
        </a>
    </header>

    <main class="container mx-auto px-6 py-10 max-w-6xl">
        <!-- Breadcrumb -->
        <div class="flex items-center gap-4 text-sm text-gray-400 mb-8">
            <a href="index.html" class="glass-card px-4 py-2 rounded-full hover:text-white"><i class="fa-solid fa-arrow-left mr-2"></i> Geri Dön</a>
            <span>Anasayfa <i class="fa-solid fa-chevron-right text-[10px] mx-2"></i> <span id="d-kategori">Yükleniyor</span></span>
        </div>

        <h1 id="d-soru" class="text-4xl font-serif leading-tight mb-4">Fetva Yükleniyor...</h1>
        <div class="flex items-center gap-4 mb-10">
            <span id="d-hukum-badge" class="bg-[#1C261E] text-green-400 border border-green-900 px-3 py-1 rounded text-sm">...</span>
            <span class="text-sm text-gray-500">Güncellenme: Bugün</span>
        </div>

        <div class="flex flex-col lg:flex-row gap-8">
            <!-- Sol Ana İçerik -->
            <div class="lg:w-2/3 space-y-6">
                
                <!-- Hüküm -->
                <div class="glass-card p-6 border-l-4 border-l-gold">
                    <h3 class="text-gold font-bold mb-2 flex items-center gap-2"><i class="fa-solid fa-scale-balanced"></i> HÜKÜM</h3>
                    <p id="d-hukum-metin" class="text-gray-300 leading-relaxed"></p>
                </div>

                <!-- Ayet -->
                <div id="ayet-box" class="glass-card p-6 border-l-4 border-l-blue-500">
                    <h3 class="text-blue-400 font-bold mb-2 flex items-center gap-2"><i class="fa-solid fa-book-open"></i> AYET</h3>
                    <p id="d-ayet" class="text-gray-300 italic mb-2"></p>
                    <span id="d-ayet-ref" class="text-sm text-gray-500"></span>
                </div>

                <!-- Hadis -->
                <div id="hadis-box" class="glass-card p-6 border-l-4 border-l-green-500">
                    <h3 class="text-green-400 font-bold mb-2 flex items-center gap-2"><i class="fa-solid fa-comment-dots"></i> HADİS</h3>
                    <p id="d-hadis" class="text-gray-300 italic mb-2"></p>
                    <span id="d-hadis-ref" class="text-sm text-gray-500"></span>
                </div>

                <!-- Açıklama -->
                <div class="glass-card p-6">
                    <h3 class="text-gold font-bold mb-4 flex items-center gap-2"><i class="fa-solid fa-circle-info"></i> AÇIKLAMA</h3>
                    <div id="d-aciklama" class="text-gray-300 leading-relaxed space-y-4"></div>
                </div>

            </div>

            <!-- Sağ Sidebar -->
            <div class="lg:w-1/3 space-y-6">
                <!-- Mezhepler -->
                <div class="glass-card p-6">
                    <h3 class="font-serif text-lg text-gold mb-4 border-b border-gray-800 pb-2">MEZHEPLERİN GÖRÜŞLERİ</h3>
                    <ul id="d-mezhepler" class="space-y-4">
                        <!-- JS ile dolacak -->
                    </ul>
                </div>

                <!-- Paylaş -->
                <div class="glass-card p-6">
                    <h3 class="font-serif text-lg mb-4">Paylaş</h3>
                    <div class="flex gap-3">
                        <button class="w-10 h-10 rounded-full bg-[#25D366] text-white flex justify-center items-center"><i class="fa-brands fa-whatsapp"></i></button>
                        <button class="w-10 h-10 rounded-full bg-[#0088cc] text-white flex justify-center items-center"><i class="fa-brands fa-telegram"></i></button>
                        <button class="w-10 h-10 rounded-full bg-[#1DA1F2] text-white flex justify-center items-center"><i class="fa-brands fa-twitter"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script>
        // Detay sayfası açıldığında çalışacak özel kod
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const slug = urlParams.get('slug');
            if(slug) {
                loadFetvaDetail(slug);
            }
        });
    </script>
</body>
</html>

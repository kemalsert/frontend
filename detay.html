<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetva Detay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
        body { background-color: #0B1120; color: #F8FAFC; font-family: 'Inter', sans-serif; }
        h1, h3 { font-family: 'Playfair Display', serif; }
        .glass-card { background: #131C31; border: 1px solid #1E293B; border-radius: 12px; }
        .text-gold { color: #D4AF37; } .border-l-gold { border-left-color: #D4AF37; }
    </style>
</head>
<body class="min-h-screen">
    <main class="container mx-auto px-6 py-10 max-w-4xl">
        <a href="index.html" class="text-gold mb-6 inline-block">← Anasayfaya Dön</a>
        <h1 id="d-soru" class="text-4xl font-serif mb-6">Yükleniyor...</h1>
        
        <div class="glass-card p-6 border-l-4 border-l-gold mb-6">
            <h3 class="text-gold font-bold mb-2">HÜKÜM</h3>
            <p id="d-hukum" class="text-white text-lg"></p>
        </div>

        <div class="glass-card p-6 mb-6">
            <h3 class="text-gold font-bold mb-4">AÇIKLAMA</h3>
            <div id="d-aciklama" class="text-gray-300 leading-relaxed"></div>
        </div>

        <div class="glass-card p-6">
            <h3 class="text-gold font-bold mb-4">MEZHEPLERİN GÖRÜŞLERİ</h3>
            <div id="d-mezhepler" class="grid grid-cols-2 gap-4 text-gray-300"></div>
        </div>
    </main>

    <script>
        // DİKKAT: AŞAĞIDAKİ ADRESİ KENDİ WORKER ADRESİNLE DEĞİŞTİR VE SONUNA /api EKLE
        const API_URL = "https://myworker.kemalssert.workers.dev/api";

        async function loadDetail() {
            const slug = new URLSearchParams(window.location.search).get('slug');
            if(!slug) return;
            const res = await fetch(`${API_URL}/fetva/${slug}`);
            const data = await res.json();
            
            document.getElementById('d-soru').innerText = data.soru;
            document.getElementById('d-hukum').innerText = data.hukum.toUpperCase();
            document.getElementById('d-aciklama').innerHTML = data.aciklama;
            
            const mezhepler = JSON.parse(data.mezhepler_json);
            let mzHtml = '';
            for(let mz in mezhepler) {
                if(mezhepler[mz] !== 'yok') mzHtml += `<div class="bg-[#0B1120] p-3 rounded border border-gray-800"><b>${mz}:</b> ${mezhepler[mz]}</div>`;
            }
            document.getElementById('d-mezhepler').innerHTML = mzHtml;
        }
        loadDetail();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fetva Kütüphanesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
        body { background-color: #0B1120; color: #F8FAFC; font-family: 'Inter', sans-serif; background-image: radial-gradient(circle at 50% 0%, #152238 0%, transparent 50%); }
        h1, h2, h3, h4, .font-serif { font-family: 'Playfair Display', serif; }
        .hero-bg { position: relative; }
        .hero-bg::after { content: ''; position: absolute; bottom: 0; right: 0; width: 50%; height: 100%; background: url('https://images.unsplash.com/photo-1584551246679-0daf3d275d0f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80') no-repeat bottom right; background-size: contain; opacity: 0.15; mask-image: linear-gradient(to left, black, transparent); -webkit-mask-image: linear-gradient(to left, black, transparent); z-index: -1; }
        .glass-card { background: #131C31; border: 1px solid #1E293B; border-radius: 12px; transition: all 0.3s ease; }
        .glass-card:hover { border-color: #D4AF37; box-shadow: 0 4px 20px rgba(212, 175, 55, 0.1); transform: translateY(-2px); }
        .text-gold { color: #D4AF37; } .border-gold { border-color: #D4AF37; }
        .bg-gold { background-color: #D4AF37; color: #0B1120; } .bg-gold:hover { background-color: #E8C34B; }
    </style>
</head>
<body class="min-h-screen">
    <header class="container mx-auto px-6 py-4 flex justify-between items-center border-b border-gray-800">
        <div class="flex items-center gap-3"><i class="fa-solid fa-book-quran text-gold text-2xl"></i><div><h1 class="font-serif font-bold text-xl tracking-wider">FETVA KÜTÜPHANESİ</h1><p class="text-[10px] text-gray-400">İlim öğren, amel et, fayda ulaştır.</p></div></div>
    </header>

    <main class="container mx-auto px-6 py-16 hero-bg">
        <div class="max-w-2xl">
            <h2 class="text-5xl font-serif mb-6 leading-tight">Doğruyu öğren,<br><span class="text-gray-400">gönül huzurunu bul.</span></h2>
            <p class="text-gray-400 mb-8">Kur'an ve sünnet ışığında, mezheplerin görüşleriyle hazırlanmış güvenilir fetvalar.</p>
        </div>

        <div class="mt-12 flex justify-between items-center mb-6"><h3 class="text-xl font-serif">Son Eklenen Fetvalar</h3></div>
        <div id="fetva-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"><div class="text-gray-500">Veriler Yükleniyor...</div></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-16">
            <div><h3 class="text-xl font-serif mb-6 border-b border-gray-800 pb-2">İslami Terimler Sözlüğü</h3><div id="terim-container" class="space-y-4"></div></div>
            <div><h3 class="text-xl font-serif mb-6 border-b border-gray-800 pb-2">Günün Hadisleri</h3><div id="hadis-container" class="space-y-4"></div></div>
        </div>
    </main>

    <script>
        // DİKKAT: AŞAĞIDAKİ ADRESİ KENDİ WORKER ADRESİNLE DEĞİŞTİR VE SONUNA /api EKLE
        const API_URL = "https://my-worker.senin-adin.workers.dev/api";

        async function load() {
            try {
                // Fetvalar
                const fRes = await fetch(`${API_URL}/fetvalar`);
                const fData = await fRes.json();
                document.getElementById('fetva-container').innerHTML = fData.map(item => `
                    <a href="detay.html?slug=${item.slug}" class="glass-card p-5 block group">
                        <div class="bg-[#1C261E] inline-block text-green-400 text-xs px-2 py-1 rounded border border-green-900 mb-3">${item.kategori}</div>
                        <h3 class="font-serif text-lg mb-8 group-hover:text-gold transition">${item.soru}</h3>
                    </a>`).join('');

                // Terimler
                const tRes = await fetch(`${API_URL}/terimler`);
                const tData = await tRes.json();
                document.getElementById('terim-container').innerHTML = tData.map(item => `
                    <div class="glass-card p-4"><h4 class="font-bold text-gold">${item.terim}</h4><p class="text-sm text-gray-300 mt-2">${item.ceviri}</p></div>`).join('');

                // Hadisler
                const hRes = await fetch(`${API_URL}/hadisler`);
                const hData = await hRes.json();
                document.getElementById('hadis-container').innerHTML = hData.map(item => `
                    <div class="glass-card p-4 border-l-2 border-l-green-500"><p class="text-sm italic text-gray-300">"${item.hadis}"</p><p class="text-xs text-gray-500 mt-2">— ${item.ravi}</p></div>`).join('');
            } catch(e) { console.log(e); }
        }
        load();
    </script>
</body>
</html>
